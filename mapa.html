<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Canchas | Conecta Fútbol</title>

    <link rel="stylesheet" href="css/styles.css">

    <!-- Leaflet para el mapa -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <span>⚽</span>
        <h1>Conecta Fútbol</h1>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="partidos.html">Partidos</a>
        <a href="estadisticas.html">Estadísticas</a>
        <button id="cerrarSesion" class="btn-nav">Cerrar sesión</button>
    </nav>
</header>

<main class="mapa-container">

    <section class="mapa-info">
        <h2>Mapa de canchas</h2>
        <p>
            Visualizá las canchas donde registraste partidos.
        </p>
    </section>

    <section class="formulario-cancha">
        <h2>Agregar cancha</h2>

        <form id="canchaForm">

            <div class="grid-formulario">

                <div class="grupo-input">
                    <label for="nombreCancha">Nombre de la cancha</label>
                    <input type="text" id="nombreCancha" required>
                </div>

                <div class="grupo-input">
                    <label for="ciudadCancha">Ciudad</label>
                    <input type="text" id="ciudadCancha" required>
                </div>

                <div class="grupo-input">
                    <label for="direccionCancha">Dirección</label>
                    <input type="text" id="direccionCancha">
                </div>

                <div class="grupo-input">
                    <label for="latitud">Latitud</label>
                    <input type="number" id="latitud" step="any" placeholder="-34.7600">
                </div>

                <div class="grupo-input">
                    <label for="longitud">Longitud</label>
                    <input type="number" id="longitud" step="any" placeholder="-58.4000">
                </div>

            </div>

            <button type="submit" class="btn-principal">
                Guardar cancha
            </button>

        </form>
    </section>

    <section class="mapa-box">
        <div id="mapa"></div>
    </section>

    <section class="historial-canchas">
        <h2>Canchas registradas</h2>

        <table>
            <thead>
                <tr>
                    <th>Cancha</th>
                    <th>Ciudad</th>
                    <th>Dirección</th>
                    <th>Coordenadas</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaCanchas">
            </tbody>
        </table>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="js/mapa.js"></script>

</body>
</html>
